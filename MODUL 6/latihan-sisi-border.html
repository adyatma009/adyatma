<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Border sisi tertentu</title>
    <style>
        header{
            border-bottom: 2px dashed silver;
        }
        footer{
            border-top: 1px solid gray
        }
    </style>
</head>
<body>
    <header>
        <h1>Latihan Border Sisi Tertentu</h1>
    </header>
        <main>
            <p>Hello ini adalah contoh latihan membuiat garis di CSS pada sisi tertetu.
                perhatikan elemen header di atas 👆, kita memberikan garis di sisi bawahnya.
                lalu cba perhatikan elemen footer di bawah 👇, kita memberikan garis di sisi atasnya.
            </p>
        </main>
    <footer>
        &copy; 2026 CSS - X PPLG
    </footer>
</body>
</html>
