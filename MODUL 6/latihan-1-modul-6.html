<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>latihan 1</title>
    <style>
        body{
            font-family: 'Times New Roman', Times, serif;
        }
        .solid{
            border: 3px solid black;
            margin-top: 1px;
            padding: 10px;
        }
        .double{
            border: 3px double blue;
            padding: 10px;
            margin-top: 10px;
        }
        .grooe{
            border: 3px groove green;
            padding: 10px;
            margin-top: 10px;
        }
        .ridge{
            border: 3px ridge red;
            padding: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="solid">ini adalah border solid</div>
    <div class="double">ini adalah border double</div>
    <div class="grooe">ini adalah border groove</div>
    <div class="ridge">ini adalah boder ridge</div>
</body>
</html>
