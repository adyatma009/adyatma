<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .solid{
            border: 3px solid blue;
            padding: 10px;
            background-color: blue;
        }
        .dotted{
            border: 3px dotted red;
            padding: 10px;
            background-color: red;
        }
        .double{
            border: 5px double green;
            padding: 10px;
            background-color: green;
        }
        .dashed{
            border: 3px dashed violet;
            padding: 10px;
            background-color: violet;
        }
        .groove{
            border: 3px groove lightblue;
            padding: 10px;
            background-color: lightblue;
        }
        .ridge{
            border: 3px ridge lightgreen;
            padding: 10px;
            background-color: lightgreen;
        }
    </style>
</head>
<body>
    <h2>contoh border CSS</h2>
    <div class="solid">ini border solid</div>
    <div class="dotted">ini border dotted</div>
    <div class="double">ini border double</div>
    <div class="dashed">ini border dashed</div>
    <div class="groove">ini border groove</div>
    <div class="ridge">ini border ridge</div>
</body>
</html>
