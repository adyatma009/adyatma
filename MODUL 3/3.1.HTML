<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .h1 {
            text-align:center;
        }
        .text-left {
            text-align:left;
        }
        .text-right {
            text-align:right;
        }
        .text-justify {
            text-align:justify;
        }
        .text-center {
            text-align:center;
        }
    </style>
</head>
<body>
    <h1 class="h1">Heading 1</h1>
    <p class="text-left">This is a left-aligned paragraph.</p>
    <p class="text-right">This is a right-aligned paragraph.</p>
    <p class="text-justify">This is a justified paragraph. It will stretch the lines so that both edges of the text are aligned with the left and right margins.</p>
    <p class="text-center">This is a centered paragraph.</p>
</body>
</html>
