<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <fieldset>
      <legend>PENDAFTARAN</legend>
      <table>
        <tr>
          <td><label for="name">masukan nama :</label></td>
          <td>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="Type your name here"
            />
          </td>
        </tr>
        <tr>
          <td><label for="email">masukan email :</label></td>
          <td>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Type your email here"
            />
          </td>
        </tr>
        <tr>
          <td><label for="nomor">nomor telefon</label></td>
          <td>
            <input
              type="number"
              id="nomor"
              name="nomor"
              placeholder="Type your nomor here"
            />
          </td>
        </tr>
      </table>
    </fieldset>
    <br />
    <fieldset>
      <legend>Informasi Akun</legend>
      <table>
        <tr>
          <td>Username :</td></td>
          <td><input type="text" name="username" required /></td>
        </tr>
        <tr>
          <td>Password :</td>
          <td><input type="password" name="password" required /></td>
        </tr>
      </table>
    </fieldset>
    <br>
    <input type="submit" value="Daftar">
  </body>
</html>
